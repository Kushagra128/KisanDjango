<!doctype html>
<html lang="hi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Kisan AI - Agricultural Advisory Chatbot</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
					Cantarell, sans-serif;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				padding: 20px;
			}

			.container {
				background: white;
				border-radius: 20px;
				box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
				width: 100%;
				max-width: 600px;
				height: 700px;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}

			.header {
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				color: white;
				padding: 20px;
				text-align: center;
			}

			.header h1 {
				font-size: 24px;
				margin-bottom: 5px;
			}

			.header p {
				font-size: 14px;
				opacity: 0.9;
			}

			.chat-container {
				flex: 1;
				overflow-y: auto;
				padding: 20px;
				background: #f5f5f5;
			}

			.message {
				margin-bottom: 15px;
				display: flex;
				animation: slideIn 0.3s ease;
			}

			@keyframes slideIn {
				from {
					opacity: 0;
					transform: translateY(10px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.message.user {
				justify-content: flex-end;
			}

			.message-content {
				max-width: 70%;
				padding: 12px 16px;
				border-radius: 18px;
				word-wrap: break-word;
			}

			.message.user .message-content {
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				color: white;
			}

			.message.bot .message-content {
				background: white;
				color: #333;
				box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
			}

			.message.bot .message-content strong {
				display: block;
				color: #667eea;
				margin-bottom: 8px;
				font-size: 14px;
			}

			.message.bot .message-content .solution {
				margin-top: 8px;
				padding-top: 8px;
				border-top: 1px solid #e0e0e0;
				font-size: 14px;
			}

			.input-container {
				display: flex;
				padding: 20px;
				background: white;
				border-top: 1px solid #e0e0e0;
			}

			#userInput {
				flex: 1;
				border: 2px solid #e0e0e0;
				border-radius: 25px;
				padding: 12px 20px;
				font-size: 14px;
				outline: none;
				transition: border-color 0.3s;
			}

			#userInput:focus {
				border-color: #667eea;
			}

			#sendBtn {
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				color: white;
				border: none;
				border-radius: 50%;
				width: 45px;
				height: 45px;
				margin-left: 10px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: transform 0.2s;
			}

			#sendBtn:hover {
				transform: scale(1.05);
			}

			#sendBtn:active {
				transform: scale(0.95);
			}

			#sendBtn:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}

			.loading {
				display: flex;
				gap: 5px;
				padding: 10px;
			}

			.loading span {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: #667eea;
				animation: bounce 1.4s infinite ease-in-out both;
			}

			.loading span:nth-child(1) {
				animation-delay: -0.32s;
			}

			.loading span:nth-child(2) {
				animation-delay: -0.16s;
			}

			@keyframes bounce {
				0%,
				80%,
				100% {
					transform: scale(0);
				}
				40% {
					transform: scale(1);
				}
			}

			.error {
				color: #e74c3c;
				font-size: 14px;
				padding: 10px;
				background: #ffe6e6;
				border-radius: 8px;
			}

			.welcome {
				text-align: center;
				color: #666;
				padding: 40px 20px;
			}

			.welcome h2 {
				color: #667eea;
				margin-bottom: 10px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="header">
				<h1>🌾 Kisan AI</h1>
				<p>कृषि सलाहकार चैटबॉट | Agricultural Advisory System</p>
			</div>

			<div class="chat-container" id="chatContainer">
				<div class="welcome">
					<h2>नमस्ते किसान भाई! 🙏</h2>
					<p>अपनी फसल की समस्या बताएं</p>
					<p style="font-size: 12px; margin-top: 10px">
						उदाहरण: टमाटर के पत्ते पीले हो रहे हैं
					</p>
				</div>
			</div>

			<div class="input-container">
				<input
					type="text"
					id="userInput"
					placeholder="अपनी समस्या यहाँ लिखें..."
					autocomplete="off"
				/>
				<button id="sendBtn">
					<svg
						width="20"
						height="20"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
					>
						<line x1="22" y1="2" x2="11" y2="13"></line>
						<polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
					</svg>
				</button>
			</div>
		</div>

		<script>
			const chatContainer = document.getElementById("chatContainer");
			const userInput = document.getElementById("userInput");
			const sendBtn = document.getElementById("sendBtn");
			const API_URL = "/search";

			// Remove welcome message on first interaction
			let firstMessage = true;

			function addMessage(content, isUser = false) {
				if (firstMessage) {
					chatContainer.innerHTML = "";
					firstMessage = false;
				}

				const messageDiv = document.createElement("div");
				messageDiv.className = `message ${isUser ? "user" : "bot"}`;

				const contentDiv = document.createElement("div");
				contentDiv.className = "message-content";

				if (isUser) {
					contentDiv.textContent = content;
				} else {
					contentDiv.innerHTML = content;
				}

				messageDiv.appendChild(contentDiv);
				chatContainer.appendChild(messageDiv);
				chatContainer.scrollTop = chatContainer.scrollHeight;
			}

			function showLoading() {
				const loadingDiv = document.createElement("div");
				loadingDiv.className = "message bot";
				loadingDiv.id = "loading";
				loadingDiv.innerHTML = `
                <div class="message-content">
                    <div class="loading">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
				chatContainer.appendChild(loadingDiv);
				chatContainer.scrollTop = chatContainer.scrollHeight;
			}

			function hideLoading() {
				const loading = document.getElementById("loading");
				if (loading) loading.remove();
			}

			async function sendMessage() {
				const query = userInput.value.trim();
				if (!query) return;

				// Add user message
				addMessage(query, true);
				userInput.value = "";
				sendBtn.disabled = true;
				showLoading();

				try {
					const response = await fetch(API_URL, {
						method: "POST",
						headers: {
							"Content-Type": "application/json",
						},
						body: JSON.stringify({ q: query }),
					});

					hideLoading();

					if (!response.ok) {
						throw new Error(`HTTP error! status: ${response.status}`);
					}

					const data = await response.json();

					// Format response
					let botMessage = "";

					if (Array.isArray(data) && data.length > 0) {
						// New format: array of solution objects
						botMessage = `
                        <strong>🌱 ${data[0].cropname || data[0].detected_crop || "फसल"}</strong>
                        <div style="margin-top: 8px;"><strong>शीर्ष ${data.length} समाधान (आवृत्ति के अनुसार):</strong></div>
                    `;

						// Display each solution WITHOUT count
						data.forEach((item, index) => {
							botMessage += `
                            <div class="solution" style="margin-top: 12px; padding: 10px; background: #f9f9f9; border-radius: 8px;">
                                <strong>${index + 1}.</strong> ${item.solution}
                            </div>
                        `;
						});
					} else if (data.solutions && data.solutions.length > 0) {
						// Fallback: array of solution strings (old intermediate format)
						botMessage = `
                        <strong>🌱 ${data.detected_crop || "फसल"}</strong>
                        <div style="margin-top: 8px;"><strong>शीर्ष समाधान (आवृत्ति के अनुसार):</strong></div>
                        <div class="solution">
                    `;

						data.solutions.forEach((solution, index) => {
							botMessage += `<div style="margin-bottom: 10px;"><strong>${index + 1}.</strong> ${solution}</div>`;
						});

						botMessage += `</div>`;
					} else if (data.id) {
						// Fallback for old single-result format
						botMessage = `
                        <strong>🌱 ${data.cropname || "फसल"}</strong>
                        <div><strong>समस्या:</strong> ${data.problem || "N/A"}</div>
                        <div class="solution"><strong>समाधान:</strong> ${data.solution || "N/A"}</div>
                    `;
					} else if (data.message) {
						// No answer or general query
						botMessage = `<div>${data.message}</div>`;
					} else {
						botMessage =
							"<div>माफ़ कीजिए, मैं आपकी समस्या को समझ नहीं पाया।</div>";
					}

					addMessage(botMessage, false);
				} catch (error) {
					hideLoading();
					addMessage(
						`<div class="error">❌ त्रुटि: ${error.message}<br>कृपया पुनः प्रयास करें।</div>`,
						false,
					);
				} finally {
					sendBtn.disabled = false;
				}
			}

			// Event listeners
			sendBtn.addEventListener("click", sendMessage);
			userInput.addEventListener("keypress", (e) => {
				if (e.key === "Enter") {
					sendMessage();
				}
			});

			// Focus input on load
			userInput.focus();
		</script>
	</body>
</html>
